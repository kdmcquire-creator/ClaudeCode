<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Bank Account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #334155;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #1e293b; }
    p  { font-size: 14px; color: #64748b; }
    .error { color: #dc2626; }
    .retry-btn {
      margin-top: 16px;
      padding: 8px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container" id="status">
    <div class="spinner"></div>
    <h2>Connecting to Plaid...</h2>
    <p>The bank connection window will open automatically.</p>
  </div>

  <!-- Plaid Link JS SDK — loaded from Plaid's CDN -->
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      function showError(msg) {
        document.getElementById('status').innerHTML =
          '<h2 class="error">Connection Error</h2>' +
          '<p>' + msg + '</p>' +
          '<button class="retry-btn" onclick="window.close()">Close</button>';
        if (window.plaidBridge) window.plaidBridge.sendError(msg);
      }

      if (!token) {
        showError('No link token provided. Please try again from Settings.');
        return;
      }

      if (!window.Plaid) {
        showError('Plaid SDK failed to load. Check your internet connection.');
        return;
      }

      try {
        var handler = window.Plaid.create({
          token: token,

          onSuccess: function (public_token, metadata) {
            document.getElementById('status').innerHTML =
              '<h2>Connected!</h2><p>Closing window...</p>';

            var result = {
              public_token: public_token,
              institution_id: (metadata.institution && metadata.institution.institution_id) || '',
              institution_name: (metadata.institution && metadata.institution.name) || 'Unknown Institution',
              accounts: (metadata.accounts || []).map(function (a) {
                return {
                  id: a.id,
                  name: a.name,
                  mask: a.mask || '',
                  type: a.type || '',
                  subtype: a.subtype || '',
                };
              }),
            };

            if (window.plaidBridge) {
              window.plaidBridge.sendSuccess(result);
            } else {
              showError('Bridge not available — plaid-link-preload.js may not be loaded.');
            }
          },

          onExit: function (err, metadata) {
            if (err) {
              console.warn('[PlaidLink] Exit with error:', err);
            }
            if (window.plaidBridge) {
              window.plaidBridge.sendExit();
            }
          },

          onEvent: function (eventName, metadata) {
            console.log('[PlaidLink] Event:', eventName, metadata);
          },
        });

        handler.open();

      } catch (e) {
        showError('Failed to initialize Plaid Link: ' + e.message);
      }
    })();
  </script>
</body>
</html>
